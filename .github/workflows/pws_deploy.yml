name: Deploy PWS naar VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verbinding maken met VPS en deployen
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: streamlit
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/streamlit/apps/pws
            git pull origin main
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart streamlit-pws
